# Python执行器 Docker Compose配置
# Windows容器部署

version: '3.8'

services:
  # Python执行器服务
  python-executor:
    build:
      context: ../..
      dockerfile: docker/windows/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-${CURRENT_DATE}}
        VERSION: ${VERSION:-v1.0.0}
    image: python-executor:${VERSION:-latest}
    container_name: python-executor
    hostname: python-executor-${EXECUTOR_ID:-01}
    
    # 环境变量
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-C:/app/config/config.json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - EXECUTOR_ID=${EXECUTOR_ID:-executor-01}
      - EXECUTOR_NAME=${EXECUTOR_NAME:-执行器1}
      - PLATFORM_HOST=${PLATFORM_HOST:-platform-api}
      - PLATFORM_PORT=${PLATFORM_PORT:-8080}
      - CANOE_ENABLED=${CANOE_ENABLED:-true}
      - TSMASTER_ENABLED=${TSMASTER_ENABLED:-true}
      - DEBUG=${DEBUG:-false}
      
    # 卷挂载
    volumes:
      # 配置文件（只读）
      - type: bind
        source: ${CONFIG_DIR:-./config}
        target: C:/app/config
        read_only: true
      
      # 日志目录
      - type: volume
        source: executor_logs
        target: C:/app/logs
      
      # CANoe安装目录（只读）- 如果存在
      - type: bind
        source: ${CANOE_PATH:-C:/Program Files/CANoe}
        target: C:/Program Files/CANoe
        read_only: true
        optional: true
      
      # TSMaster安装目录（只读）- 如果存在
      - type: bind
        source: ${TSMASTER_PATH:-C:/Program Files/TSMaster}
        target: C:/Program Files/TSMaster
        read_only: true
        optional: true
      
      # 工作目录
      - type: bind
        source: ${WORK_DIR:-./work}
        target: C:/app/work

    # 端口映射
    ports:
      - "${API_PORT:-5000}:5000"  # HTTP API
      - "${WS_PORT:-5001}:5001"    # WebSocket

    # 网络配置
    networks:
      executor-network:
        ipv4_address: ${EXECUTOR_IP:-172.20.0.10}

    # 重启策略
    restart: unless-stopped

    # 健康检查
    healthcheck:
      test: ["CMD", "powershell", "-Command", "try { Invoke-WebRequest -Uri http://localhost:5000/health -UseBasicParsing -TimeoutSec 5 | Select-Object -ExpandProperty StatusCode } catch { exit 1 }"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-4}'
          memory: ${MEMORY_LIMIT:-8G}
        reservations:
          cpus: '${CPU_RESERVE:-2}'
          memory: ${MEMORY_RESERVE:-4G}

    # Windows特定配置
    isolation: process
    tty: true
    stdin_open: true

    # 依赖（可选的Redis）
    # depends_on:
    #   redis:
    #     condition: service_healthy

  # 可选：Redis服务（用于任务队列）
  # redis:
  #   image: mcr.microsoft.com/windows/servercore:ltsc2022
  #   # 注意：Windows容器没有官方Redis镜像
  #   # 生产环境建议使用外部Redis服务

# 网络配置
networks:
  executor-network:
    driver: nat
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

# 卷配置
volumes:
  executor_logs:
    driver: local
