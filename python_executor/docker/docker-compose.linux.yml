# Python执行器 Docker Compose配置
# Linux容器部署（开发/测试环境）

version: '3.8'

services:
  # Python执行器服务
  python-executor:
    build:
      context: ../..
      dockerfile: docker/linux/Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-${CURRENT_DATE}}
        VERSION: ${VERSION:-v1.0.0-linux}
    image: python-executor:${VERSION:-latest-linux}
    container_name: python-executor-linux
    hostname: python-executor-linux-${EXECUTOR_ID:-01}
    
    # 环境变量
    environment:
      - CONFIG_PATH=${CONFIG_PATH:-/app/config/config.json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - EXECUTOR_ID=${EXECUTOR_ID:-executor-linux-01}
      - EXECUTOR_NAME=${EXECUTOR_NAME:-Linux执行器}
      - PLATFORM_HOST=${PLATFORM_HOST:-host.docker.internal}
      - PLATFORM_PORT=${PLATFORM_PORT:-8080}
      # 禁用Windows专用功能
      - CANOE_ENABLED=${CANOE_ENABLED:-false}
      - TSMASTER_ENABLED=${TSMASTER_ENABLED:-false}
      - DEBUG=${DEBUG:-false}
      
    # 卷挂载
    volumes:
      # 配置文件（只读）
      - type: bind
        source: ${CONFIG_DIR:-./config}
        target: /app/config
        read_only: true
      
      # 日志目录
      - type: volume
        source: executor_logs
        target: /app/logs
      
      # 工作目录
      - type: bind
        source: ${WORK_DIR:-./work}
        target: /app/work

    # 端口映射
    ports:
      - "${API_PORT:-5000}:5000"  # HTTP API
      - "${WS_PORT:-5001}:5001"    # WebSocket

    # 网络配置
    networks:
      executor-network:
        ipv4_address: 172.21.0.10

    # 重启策略
    restart: unless-stopped

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    # 安全配置
    user: "1000:1000"

# 网络配置
networks:
  executor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

# 卷配置
volumes:
  executor_logs:
    driver: local
