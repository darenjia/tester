{% extends "base.html" %}

{% block title %}系统配置 - 测试执行器{% endblock %}
{% block page_title %}系统配置{% endblock %}
{% set active_page = 'config' %}

{% block content %}
<div class="content-card">
    <div class="content-card-header">
        <span class="content-card-title">配置设置</span>
    </div>
    <div class="content-card-body">
        <form id="config-form">
            <!-- 服务端连接配置 -->
            <div class="form-section">
                <h3 class="form-section-title">服务端连接配置</h3>
                
                <div class="form-group">
                    <label class="form-label">WebSocket 地址</label>
                    <input type="text" class="form-input" id="websocket_url" name="server.websocket_url" 
                           placeholder="ws://localhost:8080/ws/executor">
                    <small style="color: var(--text-secondary); font-size: 12px;">
                        Java 服务端 WebSocket 连接地址
                    </small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">心跳间隔（秒）</label>
                    <input type="number" class="form-input" id="heartbeat_interval" name="server.heartbeat_interval" 
                           min="5" max="300" placeholder="30">
                </div>
                
                <div class="form-group">
                    <label class="form-label">重连间隔（秒）</label>
                    <input type="number" class="form-input" id="reconnect_interval" name="server.reconnect_interval" 
                           min="1" max="60" placeholder="5">
                </div>
            </div>
            
            <!-- 设备信息配置 -->
            <div class="form-section">
                <h3 class="form-section-title">设备信息配置</h3>
                
                <div class="form-group">
                    <label class="form-label">设备 ID</label>
                    <input type="text" class="form-input" id="device_id" name="device.device_id" 
                           placeholder="DEVICE_001">
                </div>
                
                <div class="form-group">
                    <label class="form-label">设备名称</label>
                    <input type="text" class="form-input" id="device_name" name="device.device_name" 
                           placeholder="测试执行设备-01">
                </div>
                
                <div class="form-group">
                    <label class="form-label">设备位置</label>
                    <input type="text" class="form-input" id="location" name="device.location" 
                           placeholder="实验室">
                </div>
            </div>
            
            <!-- 测试软件路径配置 -->
            <div class="form-section">
                <h3 class="form-section-title">测试软件路径配置</h3>
                
                <div class="form-group">
                    <label class="form-label">CANoe 路径</label>
                    <input type="text" class="form-input" id="canoe_path" name="software.canoe_path" 
                           placeholder="C:\Program Files\Vector\CANoe 17\Exec64\CANoe64.exe">
                </div>
                
                <div class="form-group">
                    <label class="form-label">TSMaster 路径</label>
                    <input type="text" class="form-input" id="tsmaster_path" name="software.tsmaster_path" 
                           placeholder="C:\Program Files\TSMaster">
                </div>
                
                <div class="form-group">
                    <label class="form-label">TTman 路径</label>
                    <input type="text" class="form-input" id="ttman_path" name="software.ttman_path" 
                           placeholder="C:\Spirent\TTman.bat">
                </div>
                
                <div class="form-group">
                    <label class="form-label">工作空间路径</label>
                    <input type="text" class="form-input" id="workspace_path" name="software.workspace_path" 
                           placeholder="C:\TestWorkspace">
                </div>
            </div>
            
            <!-- 日志配置 -->
            <div class="form-section">
                <h3 class="form-section-title">日志配置</h3>
                
                <div class="form-group">
                    <label class="form-label">日志级别</label>
                    <select class="form-select" id="log_level" name="logging.level">
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO">INFO</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">日志目录</label>
                    <input type="text" class="form-input" id="log_dir" name="logging.log_dir" 
                           placeholder="logs">
                </div>
            </div>
            
            <!-- 执行配置 -->
            <div class="form-section">
                <h3 class="form-section-title">执行配置</h3>
                
                <div class="form-group">
                    <label class="form-label">默认超时时间（秒）</label>
                    <input type="number" class="form-input" id="default_timeout" name="execution.default_timeout" 
                           min="60" max="7200" placeholder="3600">
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="auto_start" name="execution.auto_start" style="margin-right: 8px;">
                        自动启动服务
                    </label>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="resetConfig()">
                    <i class="fas fa-undo"></i> 重置默认
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> 保存配置
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 当前配置
    let currentConfig = {};
    
    // 加载配置
    async function loadConfig() {
        try {
            const response = await fetch('/api/config');
            const result = await response.json();
            
            if (result.success) {
                currentConfig = result.data;
                fillForm(currentConfig);
            } else {
                showMessage('加载配置失败: ' + result.message, 'error');
            }
        } catch (error) {
            console.error('加载配置失败:', error);
            showMessage('加载配置失败', 'error');
        }
    }
    
    // 填充表单
    function fillForm(config) {
        // 服务端连接配置
        document.getElementById('websocket_url').value = config.server?.websocket_url || '';
        document.getElementById('heartbeat_interval').value = config.server?.heartbeat_interval || '';
        document.getElementById('reconnect_interval').value = config.server?.reconnect_interval || '';
        
        // 设备信息配置
        document.getElementById('device_id').value = config.device?.device_id || '';
        document.getElementById('device_name').value = config.device?.device_name || '';
        document.getElementById('location').value = config.device?.location || '';
        
        // 测试软件路径配置
        document.getElementById('canoe_path').value = config.software?.canoe_path || '';
        document.getElementById('tsmaster_path').value = config.software?.tsmaster_path || '';
        document.getElementById('ttman_path').value = config.software?.ttman_path || '';
        document.getElementById('workspace_path').value = config.software?.workspace_path || '';
        
        // 日志配置
        document.getElementById('log_level').value = config.logging?.level || 'INFO';
        document.getElementById('log_dir').value = config.logging?.log_dir || '';
        
        // 执行配置
        document.getElementById('default_timeout').value = config.execution?.default_timeout || '';
        document.getElementById('auto_start').checked = config.execution?.auto_start || false;
    }
    
    // 收集表单数据
    function collectFormData() {
        const form = document.getElementById('config-form');
        const formData = new FormData(form);
        const config = {};
        
        // 处理普通字段
        for (let [key, value] of formData.entries()) {
            if (key.includes('.')) {
                const parts = key.split('.');
                let target = config;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!target[parts[i]]) {
                        target[parts[i]] = {};
                    }
                    target = target[parts[i]];
                }
                
                // 处理数字类型
                const numValue = Number(value);
                if (!isNaN(numValue) && value !== '') {
                    target[parts[parts.length - 1]] = numValue;
                } else {
                    target[parts[parts.length - 1]] = value;
                }
            } else {
                config[key] = value;
            }
        }
        
        // 处理复选框
        config.execution = config.execution || {};
        config.execution.auto_start = document.getElementById('auto_start').checked;
        
        return config;
    }
    
    // 保存配置
    async function saveConfig(config) {
        try {
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(config)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showMessage('配置保存成功', 'success');
                currentConfig = config;
            } else {
                showMessage('保存失败: ' + result.message, 'error');
            }
        } catch (error) {
            console.error('保存配置失败:', error);
            showMessage('保存配置失败', 'error');
        }
    }
    
    // 重置配置
    async function resetConfig() {
        if (!confirm('确定要重置为默认配置吗？当前配置将丢失。')) {
            return;
        }
        
        try {
            const response = await fetch('/api/config/reset', {
                method: 'POST'
            });
            
            const result = await response.json();
            
            if (result.success) {
                showMessage('配置已重置为默认值', 'success');
                fillForm(result.data);
            } else {
                showMessage('重置失败: ' + result.message, 'error');
            }
        } catch (error) {
            console.error('重置配置失败:', error);
            showMessage('重置配置失败', 'error');
        }
    }
    
    // 表单提交事件
    document.getElementById('config-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const config = collectFormData();
        saveConfig(config);
    });
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        loadConfig();
    });
</script>
{% endblock %}
